name: piper_zarr_real_image

image_shape: [3, 240, 320]
dataset_path: /home/gx4070/Desktop/arm-datasets-collect/data/piper_xy_zarr

shape_meta: &shape_meta
  obs:
    camera_wrist:
      shape: ${task.image_shape}
      type: rgb
    camera_global:
      shape: ${task.image_shape}
      type: rgb
    robot_qpos:
      shape: [6]
      type: low_dim
    robot_eef_pose:
      shape: [6]
      type: low_dim
  action:
    shape: [6]

env_runner:
  _target_: diffusion_policy.env_runner.piper_image_runner.PiperImageRunner

dataset:
  _target_: diffusion_policy.dataset.piper_zarr_image_dataset.PiperZarrImageDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  n_latency_steps: ${n_latency_steps}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: null
  image_obs_map:
    camera_wrist: camera_wrist
    camera_global: camera_global
  lowdim_obs_map:
    robot_qpos: robot_qpos
    robot_eef_pose: robot_eef_pose
  action_key: action
  valid_key: valid
